# SEO Content Stack Configuration
# ─────────────────────────────────────────────────────────────────────────────
# SETUP REQUIRED: Replace every value marked ← with your own information.
# The pipeline agent will detect placeholder values on first run and walk
# you through filling these in automatically.
# ─────────────────────────────────────────────────────────────────────────────

site:
  name: "YOUR_SITE_NAME"          # ← e.g. "Acme Corp"
  domain: "yourdomain.com"        # ← e.g. "acme.com" (no https://, no trailing slash)
  blog_base_url: "/blog/"
  free_tool_url: "/your-cta-page" # ← your primary CTA page (e.g. "/free-trial", "/pricing")

site_html:
  # Paste your site header HTML here (navigation bar, logo, etc.)
  # Leave blank to omit from generated pages.
  header: ""
  footer: ""

marketing_tags:
  gtm_id: ""         # ← Your GTM container ID (e.g. "GTM-XXXXXXX"), or leave blank to skip
  head_scripts: ""   # Additional <script>/<link> tags for <head>
  body_scripts: ""   # Additional scripts before </body>

author:
  name: "YOUR_AUTHOR_NAME"                       # ← e.g. "Acme Corp" or "Jane Smith"
  url: "https://yourdomain.com"                  # ← your site URL
  logo: "https://yourdomain.com/images/logo.png" # ← absolute URL to your logo

brand_voice:
  # Describe your tone and audience — used in writing and editorial stage prompts.
  tone: "YOUR_TONE"         # ← e.g. "direct, data-driven, conversational-professional"
  audience: "YOUR_AUDIENCE" # ← e.g. "marketing managers at B2B SaaS companies (50-500 employees)"
  topics:
    - "YOUR_PRIMARY_TOPIC"  # ← e.g. "Facebook/Meta ads"
    - "YOUR_TOPIC_2"        # ← add as many as relevant, delete unused lines
    - "YOUR_TOPIC_3"

content_defaults:
  min_word_count: 2000
  meta_title_max_chars: 60
  meta_description_min_chars: 150
  meta_description_max_chars: 160
  min_h2_count: 3
  max_h2_count: 7
  target_internal_links: 3
  categories:
    # Customize to match your content taxonomy
    - "strategy"
    - "creative"
    - "research"
    - "targeting"
    - "budget"
    - "optimization"

deploy:
  provider: "YOUR_PROVIDER" # ← e.g. "digitalocean", "netlify", "vercel", "other"
  method: "github"          # ← "github" (push triggers deploy) or "manual"
  website_root: ".."
  branch: "master"          # ← "master" or "main"
  serve_from: "deploy/"     # ← directory your host serves from

paths:
  # Pipeline artifacts (stay inside .seo-stack/)
  research: "research/"
  briefs: "briefs/"
  outlines: "outlines/"
  qa_reports: "qa-reports/"
  content_index: "content-index.json"

  # Draft source of truth — Stage 4 writes here so Python build tools can find it
  drafts: "../seo/drafts/"

  # Images go directly into the website images dir
  images: "../images/blog/"

  # Python build tools output paths
  html_output: "../blog/"          # intermediate HTML (blog/slug.html)
  deploy_output: "../deploy/blog/" # deploy artifact (deploy/blog/<slug>/index.html)

seo_tools:
  generate_html: "../seo/seo_tools/generate_html.py"
  publish: "../seo/seo_tools/publish.py"
  validate_schema: "../seo/seo_tools/validate_schema.py"
  sync_deploy: "../seo/seo_tools/sync_deploy.py"
  blog_template: "../seo/seo_tools/templates/blog_post.jinja2"
